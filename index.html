<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Daily Routine Tracker 🌸</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --p1: #ff6b9d;
        --p2: #ff8fb1;
        --p3: #ffb3c6;
        --p4: #ffd6e0;
        --p5: #fff0f4;
        --p6: #fff8fa;
        --accent: #ff4081;
        --lavender: #c8b6e2;
        --peach: #ffcba4;
        --mint: #a8e6cf;
        --sky: #a8d8ea;
        --yellow: #ffd93d;
        --td: #3d1a2e;
        --tm: #7a3d5a;
        --ts: #b87a96;
        --tl: #d4a0b8;
        --white: #ffffff;
        --r-xl: 28px;
        --r-lg: 20px;
        --r-md: 14px;
        --r-sm: 10px;
        --sh1: 0 8px 32px rgba(255, 107, 157, 0.25);
        --sh2: 0 3px 12px rgba(255, 107, 157, 0.18);
        --sh3: 0 1px 6px rgba(255, 107, 157, 0.12);
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        height: 100%;
        font-family: "Nunito", sans-serif;
        background: linear-gradient(
          160deg,
          #ffc0d9 0%,
          #e8b4f8 50%,
          #b8d4f8 100%
        );
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
      }

      .app {
        width: 100%;
        max-width: 420px;
        min-height: 100vh;
        background: var(--p6);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 80px rgba(200, 100, 160, 0.3);
      }

      /* ═══════════════ SCREENS ═══════════════ */
      .screen {
        display: none;
        flex-direction: column;
        flex: 1;
        animation: fadeSlideIn 0.3s ease;
      }
      .screen.active {
        display: flex;
      }

      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ═══════════════ HEADER ═══════════════ */
      .header {
        background: linear-gradient(
          135deg,
          var(--p1) 0%,
          #ff4081 60%,
          #e91e63 100%
        );
        padding: 48px 22px 28px;
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }
      .header::before {
        content: "";
        position: absolute;
        top: -50px;
        right: -50px;
        width: 180px;
        height: 180px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 50%;
      }
      .header::after {
        content: "🌸";
        position: absolute;
        top: 14px;
        right: 22px;
        font-size: 28px;
        opacity: 0.7;
        animation: floatBubble 3s ease-in-out infinite;
      }
      @keyframes floatBubble {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-6px) rotate(10deg);
        }
      }

      .header-brand {
        font-family: "Pacifico", cursive;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.75);
        letter-spacing: 1px;
        margin-bottom: 6px;
      }
      .header-date-big {
        font-size: 28px;
        font-weight: 900;
        color: white;
        line-height: 1.15;
      }
      .header-day {
        font-size: 13px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.8);
        margin-top: 2px;
      }

      /* Progress capsule */
      .progress-capsule {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50px;
        padding: 10px 16px;
        margin-top: 16px;
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .progress-text {
        font-size: 12px;
        font-weight: 800;
        color: white;
        white-space: nowrap;
      }
      .progress-bar-wrap {
        flex: 1;
        height: 7px;
        background: rgba(255, 255, 255, 0.25);
        border-radius: 50px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        background: white;
        border-radius: 50px;
        transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .progress-pct {
        font-size: 12px;
        font-weight: 900;
        color: white;
      }

      /* ═══════════════ BOTTOM NAV ═══════════════ */
      .bottom-nav {
        display: flex;
        background: white;
        border-top: 1px solid var(--p4);
        box-shadow: 0 -4px 20px rgba(255, 107, 157, 0.12);
        flex-shrink: 0;
        position: sticky;
        bottom: 0;
        z-index: 100;
      }
      .nav-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 10px 0 12px;
        gap: 4px;
        cursor: pointer;
        transition: transform 0.2s;
        border: none;
        background: transparent;
      }
      .nav-item:active {
        transform: scale(0.9);
      }
      .nav-icon {
        font-size: 22px;
      }
      .nav-label {
        font-size: 10px;
        font-weight: 700;
        color: var(--ts);
        letter-spacing: 0.5px;
      }
      .nav-item.active .nav-label {
        color: var(--p1);
      }
      .nav-item.active .nav-icon {
        filter: drop-shadow(0 0 6px rgba(255, 107, 157, 0.6));
      }

      /* ═══════════════ CONTENT SCROLL ═══════════════ */
      .scroll-area {
        flex: 1;
        overflow-y: auto;
        padding: 16px 16px 80px;
        -webkit-overflow-scrolling: touch;
      }
      .scroll-area::-webkit-scrollbar {
        display: none;
      }

      /* ═══════════════ TIME SECTION LABELS ═══════════════ */
      .section-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 800;
        color: var(--tm);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin: 20px 0 10px;
      }
      .section-label span {
        flex-shrink: 0;
      }
      .section-label::before {
        content: "";
        width: 20px;
        height: 1.5px;
        background: linear-gradient(to right, transparent, var(--p3));
        border-radius: 2px;
      }
      .section-label::after {
        content: "";
        flex: 1;
        height: 1.5px;
        background: linear-gradient(to right, var(--p3), transparent);
        border-radius: 2px;
      }

      /* ═══════════════ ROUTINE CARD ═══════════════ */
      .routine-card {
        background: white;
        border-radius: var(--r-lg);
        padding: 14px 16px;
        margin-bottom: 10px;
        box-shadow: var(--sh3);
        display: flex;
        align-items: center;
        gap: 14px;
        position: relative;
        overflow: hidden;
        transition:
          box-shadow 0.25s,
          transform 0.2s,
          opacity 0.3s;
        border: 2px solid transparent;
        user-select: none;
      }
      .routine-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        border-radius: 4px 0 0 4px;
        background: var(--p2);
      }
      .routine-card.done {
        background: linear-gradient(135deg, #fff5f8, #ffeef4);
        border-color: var(--p4);
      }
      .routine-card.done::before {
        background: linear-gradient(to bottom, var(--p1), var(--p3));
      }
      .routine-card.overdue::before {
        background: linear-gradient(to bottom, #ff6b6b, #ffb3b3);
      }
      .routine-card.overdue {
        border-color: #ffcccc;
      }

      /* Checkbox */
      .check-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 2.5px solid var(--p3);
        background: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
        transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        color: transparent;
      }
      .check-btn.checked {
        background: linear-gradient(135deg, var(--p1), var(--accent));
        border-color: transparent;
        box-shadow: 0 4px 12px rgba(255, 107, 157, 0.4);
        color: white;
      }

      @keyframes checkBounce {
        0% {
          transform: scale(1);
        }
        40% {
          transform: scale(1.35);
        }
        60% {
          transform: scale(0.9);
        }
        80% {
          transform: scale(1.12);
        }
        100% {
          transform: scale(1);
        }
      }
      .check-btn.bounce {
        animation: checkBounce 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* Card info */
      .card-info {
        flex: 1;
        min-width: 0;
      }
      .card-name {
        font-size: 14px;
        font-weight: 800;
        color: var(--td);
        margin-bottom: 3px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        transition: all 0.3s;
      }
      .routine-card.done .card-name {
        text-decoration: line-through;
        color: var(--tl);
      }
      .card-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .card-time {
        font-size: 11px;
        font-weight: 700;
        color: var(--p1);
        background: var(--p5);
        padding: 2px 8px;
        border-radius: 50px;
      }
      .routine-card.overdue .card-time {
        color: #e53935;
        background: #ffebee;
      }
      .card-desc {
        font-size: 11px;
        color: var(--ts);
        margin-top: 2px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* Card actions */
      .card-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }
      .card-action-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        transition:
          transform 0.15s,
          opacity 0.15s;
        opacity: 0.75;
      }
      .card-action-btn:hover {
        transform: scale(1.15);
        opacity: 1;
      }
      .btn-edit {
        background: var(--p5);
      }
      .btn-delete {
        background: #fff0f0;
      }

      /* Overdue badge */
      .overdue-badge {
        font-size: 9px;
        font-weight: 800;
        color: #e53935;
        background: #ffebee;
        padding: 2px 6px;
        border-radius: 50px;
        letter-spacing: 0.5px;
      }

      /* ═══════════════ EMPTY STATE ═══════════════ */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 24px;
        gap: 12px;
        text-align: center;
      }
      .empty-emoji {
        font-size: 64px;
        animation: floatBubble 2.5s ease-in-out infinite;
      }
      .empty-title {
        font-size: 18px;
        font-weight: 800;
        color: var(--tm);
      }
      .empty-sub {
        font-size: 13px;
        color: var(--ts);
        line-height: 1.5;
      }

      /* ═══════════════ FAB ═══════════════ */
      .fab {
        position: fixed;
        bottom: 80px;
        right: calc(50% - 196px);
        width: 58px;
        height: 58px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--p1), var(--accent));
        border: none;
        color: white;
        font-size: 28px;
        cursor: pointer;
        box-shadow: 0 6px 24px rgba(255, 64, 129, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.2s;
        z-index: 200;
        line-height: 1;
      }
      .fab:hover {
        transform: scale(1.1);
        box-shadow: 0 8px 28px rgba(255, 64, 129, 0.55);
      }
      .fab:active {
        transform: scale(0.93);
      }
      @media (max-width: 440px) {
        .fab {
          right: 16px;
        }
      }

      /* ═══════════════ MODAL ═══════════════ */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(60, 20, 45, 0.4);
        backdrop-filter: blur(4px);
        z-index: 500;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      .modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }
      .modal-sheet {
        background: white;
        border-radius: 28px 28px 0 0;
        width: 100%;
        max-width: 420px;
        padding: 20px 22px 44px;
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.34, 1.15, 0.64, 1);
        max-height: 92vh;
        overflow-y: auto;
      }
      .modal-sheet::-webkit-scrollbar {
        display: none;
      }
      .modal-overlay.open .modal-sheet {
        transform: translateY(0);
      }

      .modal-handle {
        width: 44px;
        height: 4px;
        background: var(--p4);
        border-radius: 2px;
        margin: 0 auto 20px;
      }
      .modal-title {
        font-size: 20px;
        font-weight: 900;
        color: var(--td);
        margin-bottom: 22px;
        text-align: center;
      }

      /* Form fields */
      .field {
        margin-bottom: 16px;
      }
      .field label {
        display: block;
        font-size: 11px;
        font-weight: 800;
        color: var(--tm);
        letter-spacing: 0.5px;
        margin-bottom: 7px;
        text-transform: uppercase;
      }
      .field input,
      .field textarea {
        width: 100%;
        border: 2px solid var(--p4);
        border-radius: var(--r-md);
        padding: 12px 16px;
        font-family: "Nunito", sans-serif;
        font-size: 14px;
        font-weight: 700;
        color: var(--td);
        background: var(--p6);
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .field input:focus,
      .field textarea:focus {
        border-color: var(--p1);
        box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.12);
        background: white;
      }
      .field textarea {
        resize: none;
        height: 72px;
      }

      /* Period chips */
      .period-chips {
        display: flex;
        gap: 8px;
      }
      .chip {
        flex: 1;
        padding: 10px 4px;
        border-radius: var(--r-md);
        border: 2px solid var(--p4);
        background: var(--p6);
        text-align: center;
        font-size: 12px;
        font-weight: 800;
        color: var(--tm);
        cursor: pointer;
        transition: all 0.2s;
      }
      .chip.selected {
        border-color: var(--p1);
        background: var(--p5);
        color: var(--p1);
        box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.1);
      }

      /* Buttons */
      .btn-row {
        display: flex;
        gap: 10px;
        margin-top: 22px;
      }
      .btn {
        flex: 1;
        padding: 15px;
        border-radius: var(--r-lg);
        border: none;
        font-family: "Nunito", sans-serif;
        font-size: 15px;
        font-weight: 900;
        cursor: pointer;
        transition:
          transform 0.15s,
          box-shadow 0.2s;
        letter-spacing: 0.3px;
      }
      .btn:active {
        transform: scale(0.96);
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--p1), var(--accent));
        color: white;
        box-shadow: 0 6px 20px rgba(255, 107, 157, 0.35);
      }
      .btn-primary:hover {
        box-shadow: 0 8px 24px rgba(255, 107, 157, 0.45);
      }
      .btn-secondary {
        background: var(--p5);
        color: var(--p1);
      }

      /* ═══════════════ HISTORY SCREEN ═══════════════ */
      .history-header {
        background: linear-gradient(135deg, #c8b6e2 0%, #a78bdc 100%);
        padding: 48px 22px 24px;
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }
      .history-header::before {
        content: "";
        position: absolute;
        bottom: -40px;
        right: -40px;
        width: 140px;
        height: 140px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
      }
      .history-header::after {
        content: "📅";
        position: absolute;
        top: 16px;
        right: 22px;
        font-size: 26px;
        animation: floatBubble 2.8s ease-in-out infinite;
      }
      .history-header h1 {
        font-family: "Pacifico", cursive;
        font-size: 22px;
        color: white;
        margin-bottom: 4px;
      }
      .history-header p {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.8);
        font-weight: 600;
      }

      .date-filter-row {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 16px 16px 4px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        flex-shrink: 0;
      }
      .date-filter-row::-webkit-scrollbar {
        display: none;
      }
      .date-chip {
        flex-shrink: 0;
        padding: 8px 14px;
        border-radius: 50px;
        background: white;
        border: 2px solid var(--p4);
        font-size: 12px;
        font-weight: 800;
        color: var(--tm);
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .date-chip.active {
        background: linear-gradient(135deg, var(--lavender), #a78bdc);
        border-color: transparent;
        color: white;
        box-shadow: 0 4px 12px rgba(167, 139, 220, 0.3);
      }

      .history-scroll {
        flex: 1;
        overflow-y: auto;
        padding-bottom: 24px;
      }
      .history-scroll::-webkit-scrollbar {
        display: none;
      }

      .history-summary {
        background: white;
        border-radius: var(--r-lg);
        margin: 12px 16px;
        padding: 16px 12px;
        box-shadow: var(--sh3);
        display: flex;
      }
      .stat-item {
        flex: 1;
        text-align: center;
      }
      .stat-item + .stat-item {
        border-left: 1px solid var(--p4);
      }
      .stat-val {
        font-size: 22px;
        font-weight: 900;
        color: var(--p1);
      }
      .stat-label {
        font-size: 10px;
        font-weight: 700;
        color: var(--ts);
        margin-top: 2px;
      }

      .history-day-header {
        font-size: 11px;
        font-weight: 900;
        color: var(--lavender);
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 8px 16px 6px;
      }
      .history-card {
        background: white;
        border-radius: var(--r-lg);
        padding: 13px 16px;
        margin: 0 16px 8px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: var(--sh3);
      }
      .history-status {
        font-size: 20px;
        flex-shrink: 0;
      }
      .history-info {
        flex: 1;
        min-width: 0;
      }
      .history-name {
        font-size: 13px;
        font-weight: 800;
        color: var(--td);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .history-time {
        font-size: 11px;
        color: var(--ts);
        margin-top: 2px;
      }

      /* ═══════════════ TOAST ═══════════════ */
      .toast-container {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
        align-items: center;
      }
      .toast {
        background: var(--td);
        color: white;
        padding: 12px 20px;
        border-radius: 50px;
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      .toast.out {
        animation: toastOut 0.25s ease forwards;
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(-10px) scale(0.9);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes toastOut {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
          transform: translateY(-6px);
        }
      }

      .sort-info {
        font-size: 11px;
        color: var(--ts);
        text-align: center;
        padding: 8px 0 0;
        font-weight: 600;
      }

      /* Swipe hint */
      .swipe-hint {
        font-size: 10px;
        color: var(--tl);
        text-align: center;
        padding: 4px 0 12px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="app" id="app">
      <!-- HOME SCREEN -->
      <div class="screen active" id="screen-home">
        <div class="header">
          <div class="header-brand">Daily Routine Tracker</div>
          <div class="header-date-big" id="today-date">—</div>
          <div class="header-day" id="today-day">—</div>
          <div class="progress-capsule">
            <span class="progress-text" id="prog-text">0/0 selesai</span>
            <div class="progress-bar-wrap">
              <div
                class="progress-bar-fill"
                id="prog-bar"
                style="width: 0%"
              ></div>
            </div>
            <span class="progress-pct" id="prog-pct">0%</span>
          </div>
        </div>
        <div class="scroll-area" id="routine-list"></div>
        <button class="fab" id="fab-add">＋</button>
      </div>

      <!-- HISTORY SCREEN -->
      <div class="screen" id="screen-history">
        <div class="history-header">
          <h1>Riwayat 📖</h1>
          <p>Rutinitas hari-hari sebelumnya</p>
        </div>
        <div class="date-filter-row" id="date-filter-row"></div>
        <div class="history-scroll" id="history-content"></div>
      </div>

      <!-- BOTTOM NAV -->
      <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchScreen('home', this)">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Hari Ini</span>
        </button>
        <button class="nav-item" onclick="switchScreen('history', this)">
          <span class="nav-icon">📅</span>
          <span class="nav-label">Riwayat</span>
        </button>
      </nav>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title" id="modal-title">✨ Tambah Rutinitas</div>

        <div class="field">
          <label>Nama Rutinitas *</label>
          <input
            type="text"
            id="f-name"
            placeholder="Contoh: Minum air putih 💧"
            maxlength="60"
          />
        </div>

        <div class="field">
          <label>⏰ Waktu</label>
          <input type="time" id="f-time" value="07:00" />
        </div>

        <div class="field">
          <label>📍 Periode Hari</label>
          <div class="period-chips" id="period-chips">
            <div
              class="chip selected"
              data-val="🌅 Pagi"
              onclick="selectPeriod(this)"
            >
              🌅 Pagi
            </div>
            <div class="chip" data-val="☀️ Siang" onclick="selectPeriod(this)">
              ☀️ Siang
            </div>
            <div class="chip" data-val="🌙 Malam" onclick="selectPeriod(this)">
              🌙 Malam
            </div>
          </div>
        </div>

        <div class="field">
          <label>📝 Deskripsi (opsional)</label>
          <textarea
            id="f-desc"
            placeholder="Tambah catatan singkat..."
          ></textarea>
        </div>

        <div class="btn-row">
          <button class="btn btn-secondary" onclick="closeModal()">
            Batal
          </button>
          <button class="btn btn-primary" onclick="saveRoutine()">
            💾 Simpan
          </button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toast-container"></div>

    <script>
      /* ══════════════════════════════════════════════════
   STORAGE
══════════════════════════════════════════════════ */
      const STORE_KEY = "drt_routines_v2";
      const HIST_KEY = "drt_history_v2";
      const LAST_KEY = "drt_lastdate_v2";

      function todayISO() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      }

      function loadRoutines() {
        return JSON.parse(localStorage.getItem(STORE_KEY) || "[]");
      }
      function saveRoutines(a) {
        localStorage.setItem(STORE_KEY, JSON.stringify(a));
      }
      function loadHistory() {
        return JSON.parse(localStorage.getItem(HIST_KEY) || "{}");
      }
      function saveHistory(o) {
        localStorage.setItem(HIST_KEY, JSON.stringify(o));
      }

      function checkMidnightReset() {
        const last = localStorage.getItem(LAST_KEY);
        const today = todayISO();
        if (last && last !== today) {
          const history = loadHistory();
          const routines = loadRoutines();
          if (routines.length > 0)
            history[last] = routines.map((r) => ({ ...r }));
          saveHistory(history);
          saveRoutines(routines.map((r) => ({ ...r, done: false })));
          showToast("🌅 Selamat pagi! Checklist direset untuk hari baru~");
        }
        localStorage.setItem(LAST_KEY, today);
      }

      /* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
      let routines = [];
      let editingId = null;
      let selectedPeriod = "🌅 Pagi";
      let selectedHistDate = null;

      // touch swipe
      let _sx = 0,
        _sy = 0,
        _swipeEl = null;

      /* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
      function init() {
        checkMidnightReset();
        routines = loadRoutines();
        renderHeader();
        renderRoutines();
        setupTimers();
        seedIfEmpty();
      }

      function renderHeader() {
        const now = new Date();
        const dateStr = now.toLocaleDateString("id-ID", {
          day: "numeric",
          month: "long",
          year: "numeric",
        });
        const dayStr = now.toLocaleDateString("id-ID", { weekday: "long" });
        document.getElementById("today-date").textContent = dateStr;
        document.getElementById("today-day").textContent = "📆 " + dayStr;
        updateProgress();
      }

      function updateProgress() {
        const total = routines.length;
        const done = routines.filter((r) => r.done).length;
        const pct = total ? Math.round((done / total) * 100) : 0;
        document.getElementById("prog-text").textContent =
          `${done}/${total} selesai`;
        document.getElementById("prog-bar").style.width = pct + "%";
        document.getElementById("prog-pct").textContent = pct + "%";
      }

      /* ══════════════════════════════════════════════════
   RENDER ROUTINES
══════════════════════════════════════════════════ */
      function timePeriod(time) {
        if (!time) return "🌅 Pagi";
        const h = parseInt(time.split(":")[0]);
        if (h < 12) return "🌅 Pagi";
        if (h < 17) return "☀️ Siang";
        return "🌙 Malam";
      }

      function isOverdue(r) {
        if (r.done || !r.time) return false;
        const now = new Date();
        const [hh, mm] = r.time.split(":").map(Number);
        const t = new Date();
        t.setHours(hh, mm, 0, 0);
        return now > t;
      }

      function renderRoutines() {
        const list = document.getElementById("routine-list");
        const sorted = [...routines].sort((a, b) =>
          (a.time || "00:00").localeCompare(b.time || "00:00"),
        );

        if (!sorted.length) {
          list.innerHTML = `<div class="empty-state">
      <div class="empty-emoji">🌸</div>
      <div class="empty-title">Belum ada rutinitas!</div>
      <div class="empty-sub">Tekan tombol <strong style="color:var(--p1)">＋</strong> untuk menambahkan<br>rutinitas harian-mu yang pertama.</div>
    </div>`;
          updateProgress();
          return;
        }

        const groups = { "🌅 Pagi": [], "☀️ Siang": [], "🌙 Malam": [] };
        sorted.forEach((r) => {
          const p = r.period || timePeriod(r.time);
          (groups[p] || groups["🌅 Pagi"]).push(r);
        });

        let html = `<p class="sort-info">Diurutkan pagi → malam</p>
              <p class="swipe-hint">💡 Geser kiri untuk hapus · Geser kanan untuk edit</p>`;

        Object.entries(groups).forEach(([label, items]) => {
          if (!items.length) return;
          html += `<div class="section-label"><span>${label}</span></div>`;
          items.forEach((r) => {
            const od = isOverdue(r);
            html += `
        <div class="routine-card${r.done ? " done" : ""}${od && !r.done ? " overdue" : ""}"
             id="card-${r.id}" data-id="${r.id}">
          <button class="check-btn${r.done ? " checked" : ""}" id="chk-${r.id}"
                  onclick="toggleDone('${r.id}',event)">
            ${r.done ? "✓" : ""}
          </button>
          <div class="card-info">
            <div class="card-name">${esc(r.name)}</div>
            <div class="card-meta">
              <span class="card-time">⏰ ${r.time || "--:--"} WIB</span>
              ${od && !r.done ? '<span class="overdue-badge">LEWAT!</span>' : ""}
            </div>
            ${r.desc ? `<div class="card-desc">${esc(r.desc)}</div>` : ""}
          </div>
          <div class="card-actions">
            <button class="card-action-btn btn-edit" onclick="openEdit('${r.id}',event)">✏️</button>
            <button class="card-action-btn btn-delete" onclick="deleteRoutine('${r.id}',event)">🗑️</button>
          </div>
        </div>`;
          });
        });

        list.innerHTML = html;

        // attach swipe listeners
        list.querySelectorAll(".routine-card").forEach((card) => {
          card.addEventListener("touchstart", swipeStart, { passive: true });
          card.addEventListener("touchmove", swipeMove, { passive: false });
          card.addEventListener("touchend", swipeEnd, { passive: true });
        });

        updateProgress();
      }

      /* ══════════════════════════════════════════════════
   TOGGLE DONE
══════════════════════════════════════════════════ */
      function toggleDone(id, e) {
        e.stopPropagation();
        const r = routines.find((x) => x.id === id);
        if (!r) return;
        r.done = !r.done;
        saveRoutines(routines);

        const btn = document.getElementById("chk-" + id);
        if (btn) {
          btn.className = "check-btn" + (r.done ? " checked" : "");
          btn.textContent = r.done ? "✓" : "";
          btn.classList.add("bounce");
          btn.addEventListener(
            "animationend",
            () => btn.classList.remove("bounce"),
            { once: true },
          );
        }

        const card = document.getElementById("card-" + id);
        if (card) {
          card.classList.toggle("done", r.done);
          card.querySelector(".card-name").style.textDecoration = r.done
            ? "line-through"
            : "";
        }

        if (r.done) {
          playPop();
          spawnConfetti(e);
          showToast("✅ " + r.name + " selesai! 🎉");
        } else {
          showToast("↩️ " + r.name + " dibatalkan");
        }
        updateProgress();
      }

      /* ══════════════════════════════════════════════════
   SOUND — Web Audio API
══════════════════════════════════════════════════ */
      function playPop() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          [
            [880, 0, 0.06],
            [1200, 0.06, 0.1],
            [600, 0.1, 0.22],
          ].forEach(([freq, start, end]) => {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g);
            g.connect(ctx.destination);
            o.type = "sine";
            o.frequency.value = freq;
            g.gain.setValueAtTime(0.18, ctx.currentTime + start);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + end);
            o.start(ctx.currentTime + start);
            o.stop(ctx.currentTime + end);
          });
        } catch (e) {}
      }

      /* ══════════════════════════════════════════════════
   CONFETTI
══════════════════════════════════════════════════ */
      function spawnConfetti(e) {
        const colors = [
          "#ff6b9d",
          "#ffd93d",
          "#a8e6cf",
          "#c8b6e2",
          "#ffb3c6",
          "#a8d8ea",
          "#ff8fb1",
        ];
        const x = e.clientX || e.touches?.[0]?.clientX || window.innerWidth / 2;
        const y =
          e.clientY || e.touches?.[0]?.clientY || window.innerHeight / 2;
        for (let i = 0; i < 12; i++) {
          const d = document.createElement("div");
          const angle = (i / 12) * 360;
          const dist = 35 + Math.random() * 45;
          const tx = Math.cos((angle * Math.PI) / 180) * dist;
          const ty = Math.sin((angle * Math.PI) / 180) * dist;
          const size = 5 + Math.random() * 6;
          Object.assign(d.style, {
            position: "fixed",
            left: x + "px",
            top: y + "px",
            width: size + "px",
            height: size + "px",
            borderRadius: Math.random() > 0.5 ? "50%" : "3px",
            background: colors[i % colors.length],
            pointerEvents: "none",
            zIndex: "9999",
          });
          document.body.appendChild(d);
          d.animate(
            [
              { transform: "translate(-50%,-50%) scale(1)", opacity: 1 },
              {
                transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0.3)`,
                opacity: 0,
              },
            ],
            { duration: 600 + i * 30, easing: "ease-out", fill: "forwards" },
          );
          setTimeout(() => d.remove(), 700 + i * 35);
        }
      }

      /* ══════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════ */
      document.getElementById("fab-add").onclick = () => {
        editingId = null;
        resetForm();
        document.getElementById("modal-title").textContent =
          "✨ Tambah Rutinitas";
        openModal();
      };

      document
        .getElementById("modal-overlay")
        .addEventListener("click", (e) => {
          if (e.target === document.getElementById("modal-overlay"))
            closeModal();
        });

      function openModal() {
        document.getElementById("modal-overlay").classList.add("open");
      }
      function closeModal() {
        document.getElementById("modal-overlay").classList.remove("open");
        editingId = null;
        resetForm();
      }

      function resetForm() {
        document.getElementById("f-name").value = "";
        document.getElementById("f-time").value = "07:00";
        document.getElementById("f-desc").value = "";
        selectedPeriod = "🌅 Pagi";
        syncChips();
      }

      function selectPeriod(el) {
        selectedPeriod = el.dataset.val;
        syncChips();
        const t = document.getElementById("f-time");
        if (!editingId) {
          if (selectedPeriod === "🌅 Pagi") t.value = "07:00";
          else if (selectedPeriod === "☀️ Siang") t.value = "12:00";
          else t.value = "20:00";
        }
      }

      function syncChips() {
        document
          .querySelectorAll("#period-chips .chip")
          .forEach((c) =>
            c.classList.toggle("selected", c.dataset.val === selectedPeriod),
          );
      }

      document.getElementById("f-time").addEventListener("change", function () {
        const h = parseInt(this.value.split(":")[0]);
        selectedPeriod = h < 12 ? "🌅 Pagi" : h < 17 ? "☀️ Siang" : "🌙 Malam";
        syncChips();
      });

      function openEdit(id, e) {
        e.stopPropagation();
        const r = routines.find((x) => x.id === id);
        if (!r) return;
        editingId = id;
        document.getElementById("f-name").value = r.name;
        document.getElementById("f-time").value = r.time || "07:00";
        document.getElementById("f-desc").value = r.desc || "";
        selectedPeriod = r.period || timePeriod(r.time);
        syncChips();
        document.getElementById("modal-title").textContent =
          "✏️ Edit Rutinitas";
        openModal();
      }

      function saveRoutine() {
        const name = document.getElementById("f-name").value.trim();
        const time = document.getElementById("f-time").value;
        const desc = document.getElementById("f-desc").value.trim();

        if (!name) {
          shake(document.getElementById("f-name"));
          showToast("⚠️ Nama rutinitas wajib diisi!");
          return;
        }

        if (editingId) {
          const i = routines.findIndex((r) => r.id === editingId);
          if (i !== -1)
            routines[i] = {
              ...routines[i],
              name,
              time,
              desc,
              period: selectedPeriod,
            };
          showToast("✏️ Rutinitas berhasil diperbarui!");
        } else {
          routines.push({
            id: "r" + Date.now() + Math.random().toString(36).slice(2, 5),
            name,
            time,
            desc,
            period: selectedPeriod,
            done: false,
          });
          showToast("🌸 Rutinitas baru ditambahkan!");
        }
        saveRoutines(routines);
        closeModal();
        renderRoutines();
      }

      function deleteRoutine(id, e) {
        e.stopPropagation();
        if (!confirm("Hapus rutinitas ini? 🗑️")) return;
        const card = document.getElementById("card-" + id);
        if (card) {
          card.style.transition = "all 0.28s ease";
          card.style.opacity = "0";
          card.style.transform = "scale(0.88)";
          setTimeout(() => {
            routines = routines.filter((r) => r.id !== id);
            saveRoutines(routines);
            renderRoutines();
          }, 280);
        } else {
          routines = routines.filter((r) => r.id !== id);
          saveRoutines(routines);
          renderRoutines();
        }
        showToast("🗑️ Rutinitas dihapus.");
      }

      /* ══════════════════════════════════════════════════
   SWIPE GESTURES
══════════════════════════════════════════════════ */
      function swipeStart(e) {
        _sx = e.touches[0].clientX;
        _sy = e.touches[0].clientY;
        _swipeEl = this;
      }
      function swipeMove(e) {
        const dx = e.touches[0].clientX - _sx;
        const dy = e.touches[0].clientY - _sy;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
          e.preventDefault();
          const clamped = Math.max(-100, Math.min(100, dx * 0.55));
          this.style.transform = `translateX(${clamped}px)`;
          this.style.transition = "none";
        }
      }
      function swipeEnd(e) {
        const dx = e.changedTouches[0].clientX - _sx;
        this.style.transition = "transform 0.3s cubic-bezier(0.34,1.56,0.64,1)";
        this.style.transform = "";
        if (dx < -70) {
          // swipe left → delete
          const id = this.dataset.id;
          this.style.transition = "all 0.28s ease";
          this.style.opacity = "0";
          this.style.transform = "translateX(-110%)";
          setTimeout(() => {
            routines = routines.filter((r) => r.id !== id);
            saveRoutines(routines);
            renderRoutines();
            showToast("🗑️ Rutinitas dihapus.");
          }, 280);
        } else if (dx > 70) {
          // swipe right → edit
          openEdit(this.dataset.id, { stopPropagation: () => {} });
        }
      }

      /* ══════════════════════════════════════════════════
   HISTORY
══════════════════════════════════════════════════ */
      function renderHistory() {
        const history = loadHistory();
        const dates = Object.keys(history).sort((a, b) => b.localeCompare(a));
        const filterRow = document.getElementById("date-filter-row");
        const content = document.getElementById("history-content");

        if (!dates.length) {
          filterRow.innerHTML = "";
          content.innerHTML = `<div class="empty-state">
      <div class="empty-emoji">📭</div>
      <div class="empty-title">Belum ada riwayat</div>
      <div class="empty-sub">Riwayat akan tersimpan otomatis<br>ketika hari berganti 🌙</div>
    </div>`;
          return;
        }

        if (!selectedHistDate || !history[selectedHistDate])
          selectedHistDate = dates[0];

        filterRow.innerHTML = dates
          .map(
            (d) => `
    <div class="date-chip${d === selectedHistDate ? " active" : ""}" onclick="selHistDate('${d}')">
      ${fmtDate(d)}
    </div>`,
          )
          .join("");

        const day = history[selectedHistDate] || [];
        const total = day.length,
          done = day.filter((r) => r.done).length;
        const pct = total ? Math.round((done / total) * 100) : 0;

        let html = `<div class="history-summary">
    <div class="stat-item"><div class="stat-val">${total}</div><div class="stat-label">TOTAL</div></div>
    <div class="stat-item"><div class="stat-val" style="color:#43a047">${done}</div><div class="stat-label">SELESAI</div></div>
    <div class="stat-item"><div class="stat-val" style="color:#e53935">${total - done}</div><div class="stat-label">BELUM</div></div>
    <div class="stat-item"><div class="stat-val">${pct}%</div><div class="stat-label">SKOR</div></div>
  </div>
  <div class="history-day-header">📅 ${fmtDate(selectedHistDate)}</div>`;

        const sorted = [...day].sort((a, b) =>
          (a.time || "").localeCompare(b.time || ""),
        );
        if (!sorted.length) {
          html += `<div style="text-align:center;padding:24px;color:var(--ts);font-size:13px;font-weight:700;">Tidak ada data untuk tanggal ini.</div>`;
        } else {
          sorted.forEach((r) => {
            html += `<div class="history-card">
        <div class="history-status">${r.done ? "✅" : "❌"}</div>
        <div class="history-info">
          <div class="history-name">${esc(r.name)}</div>
          <div class="history-time">⏰ ${r.time || "--:--"} WIB · ${r.period || timePeriod(r.time)}</div>
          ${r.desc ? `<div class="history-time" style="margin-top:1px;">📝 ${esc(r.desc)}</div>` : ""}
        </div>
      </div>`;
          });
        }
        content.innerHTML = html;

        // scroll active chip into view
        const activeChip = filterRow.querySelector(".date-chip.active");
        if (activeChip)
          setTimeout(
            () =>
              activeChip.scrollIntoView({
                behavior: "smooth",
                block: "nearest",
                inline: "center",
              }),
            50,
          );
      }

      function selHistDate(d) {
        selectedHistDate = d;
        renderHistory();
      }
      function fmtDate(iso) {
        return new Date(iso + "T00:00:00").toLocaleDateString("id-ID", {
          day: "numeric",
          month: "short",
          year: "numeric",
        });
      }

      /* ══════════════════════════════════════════════════
   SCREEN SWITCH
══════════════════════════════════════════════════ */
      function switchScreen(name, btn) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document
          .querySelectorAll(".nav-item")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById("screen-" + name).classList.add("active");
        btn.classList.add("active");
        if (name === "history") renderHistory();
      }

      /* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function showToast(msg) {
        const c = document.getElementById("toast-container");
        const t = document.createElement("div");
        t.className = "toast";
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(() => {
          t.classList.add("out");
          t.addEventListener("animationend", () => t.remove());
        }, 2600);
      }

      function shake(el) {
        el.animate(
          [
            { transform: "translateX(0)" },
            { transform: "translateX(-9px)" },
            { transform: "translateX(9px)" },
            { transform: "translateX(-6px)" },
            { transform: "translateX(6px)" },
            { transform: "translateX(0)" },
          ],
          { duration: 380, easing: "ease" },
        );
        const orig = el.style.borderColor;
        el.style.borderColor = "#ff4444";
        setTimeout(() => (el.style.borderColor = orig), 600);
      }

      /* ══════════════════════════════════════════════════
   TIMERS
══════════════════════════════════════════════════ */
      function setupTimers() {
        // Midnight auto-reset
        const now = new Date();
        const midnight = new Date(now);
        midnight.setDate(midnight.getDate() + 1);
        midnight.setHours(0, 0, 5, 0);
        setTimeout(() => {
          checkMidnightReset();
          routines = loadRoutines();
          renderRoutines();
          setupTimers();
        }, midnight - now);
        // Overdue refresh every minute
        setInterval(() => {
          if (
            document.getElementById("screen-home").classList.contains("active")
          )
            renderRoutines();
        }, 60000);
      }

      /* ══════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
══════════════════════════════════════════════════ */
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
        if (
          e.key === "Enter" &&
          document.getElementById("modal-overlay").classList.contains("open") &&
          document.activeElement.tagName !== "TEXTAREA"
        )
          saveRoutine();
      });

══════════════════════════════════════════════════ */

            desc: "Target 7-8 jam tidur",
            done: false,
          },
        ];
        saveRoutines(samples);
        localStorage.setItem(LAST_KEY, todayISO());

        // Seed history for 3 past days
        const hist = {};
        for (let offset = 1; offset <= 3; offset++) {
          const d = new Date();
          d.setDate(d.getDate() - offset);
          const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
          const doneCount = [7, 5, 4][offset - 1];
          hist[key] = samples.map((r, i) => ({ ...r, done: i < doneCount }));

        saveHistory(hist);
        routines = loadRoutines();
        renderRoutines();
